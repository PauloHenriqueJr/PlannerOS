<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Guia Corpo e Fitness</title>
  <desc id="desc">Mockup visual com progresso de peso, medidas e metas fitness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#65e4ff"/>
      <stop offset=".5" stop-color="#a7f56e"/>
      <stop offset="1" stop-color="#45f5a7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="25" flood-color="#14532d" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g transform="translate(88 86)" filter="url(#shadow)">
    <rect width="1024" height="728" rx="38" fill="#f8f5f2"/>
    <rect x="44" y="46" width="936" height="110" rx="28" fill="#242220"/>
    <text x="82" y="110" fill="#e8e1d9" font-family="Georgia, serif" font-size="46" font-style="italic" font-weight="700">Body &amp; Fitness Tracker</text>
    <text x="760" y="106" fill="#d4b895" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="2">PESO + METAS</text>
    <rect x="44" y="194" width="408" height="472" rx="28" fill="#ffffff"/>
    <text x="82" y="250" fill="#3d3d3d" font-family="Georgia, serif" font-size="38" font-style="italic" font-weight="700">Progresso</text>
    <text x="82" y="328" fill="#3d3d3d" font-family="Georgia, serif" font-size="54" font-style="italic" font-weight="700">78.9 kg</text>
    <text x="84" y="362" fill="#a6927c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2">ATUAL</text>
    <rect x="82" y="424" width="300" height="24" rx="12" fill="#e8e1d9"/>
    <rect x="82" y="424" width="190" height="24" rx="12" fill="#22c55e"/>
    <text x="82" y="488" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Meta: 74.0 kg</text>
    <text x="82" y="530" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Inicio: 82.0 kg</text>
    <rect x="488" y="194" width="492" height="218" rx="28" fill="#ffffff"/>
    <text x="526" y="250" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">HISTORICO</text>
    <polyline points="530,344 615,318 700,294 785,270 900,238" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="530" cy="344" r="13" fill="#22c55e"/>
    <circle cx="615" cy="318" r="13" fill="#22c55e"/>
    <circle cx="700" cy="294" r="13" fill="#22c55e"/>
    <circle cx="785" cy="270" r="13" fill="#22c55e"/>
    <circle cx="900" cy="238" r="13" fill="#22c55e"/>
    <rect x="488" y="448" width="236" height="218" rx="28" fill="#ffffff"/>
    <text x="526" y="504" fill="#a6927c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">MEDIDAS</text>
    <text x="526" y="558" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Cintura 84 cm</text>
    <text x="526" y="602" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Quadril 102 cm</text>
    <rect x="752" y="448" width="228" height="218" rx="28" fill="#ecfdf5"/>
    <text x="790" y="504" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">MARCOS</text>
    <rect x="792" y="546" width="24" height="24" rx="6" fill="#22c55e"/>
    <text x="832" y="565" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">7 dias</text>
    <rect x="792" y="596" width="24" height="24" rx="6" fill="none" stroke="#22c55e" stroke-width="4"/>
    <text x="832" y="615" fill="#3d3d3d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">78 kg</text>
